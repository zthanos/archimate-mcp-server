name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Smoke test CLI export
        run: |
          mkdir -p out
          uv run archimate-mcp-cli export src/archimate_mcp/examples/sample_model.json --output out/model.xml
          test -f out/model.xml
          test -s out/model.xml